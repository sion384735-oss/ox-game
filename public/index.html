<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>사회적경제 퀴즈</title>
    <link rel="stylesheet" href="/styles.css?v=background-panel-20260703" />
  </head>
  <body class="participant-page">
    <main class="quiz-shell" id="app">
      <section class="start-panel" id="startPanel">
        <div class="hero-content-panel">
          <div class="brand-block">
            <p class="kicker" id="startKicker">사회적경제</p>
            <h1 id="quizTitle">퀴즈 게임</h1>
            <p class="start-meta" id="startMeta">문제를 불러오는 중...</p>
          </div>
          <button class="primary-action xl" id="startButton" disabled>시작하기</button>
        </div>
      </section>

      <section class="quiz-panel hidden" id="quizPanel" aria-live="polite">
        <header class="quiz-topbar">
          <div>
            <p class="kicker">문제</p>
            <strong id="progressLabel">1 / 1</strong>
          </div>
          <div class="timer-badge" id="timerBadge">15</div>
        </header>

        <div class="timer-track" aria-hidden="true">
          <div class="timer-fill" id="timerFill"></div>
        </div>

        <article class="question-area">
          <h2 id="questionText"></h2>
          <div class="answer-grid" id="answerGrid"></div>
        </article>

        <div class="result-stamp hidden" id="resultStamp">
          <span id="resultSymbol">O</span>
          <strong id="resultText">정답입니다</strong>
        </div>
      </section>

      <section class="complete-panel hidden" id="completePanel">
        <div class="fireworks" id="fireworks" aria-hidden="true"></div>
        <div class="hero-content-panel">
          <p class="kicker" id="finalKicker">FINISH</p>
          <h2 class="mission-title" id="finalMessage">MISSION COMPLETE</h2>
          <button class="primary-action xl" id="restartButton">다시 시작</button>
        </div>
      </section>
    </main>

    <script src="/app.js?v=background-panel-20260703"></script>
  </body>
</html>

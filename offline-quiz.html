<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>사회적경제 퀴즈 오프라인</title>
    <style>
:root {
  --ink: #17212b;
  --muted: #5f6f7f;
  --line: #d8e0e7;
  --paper: #ffffff;
  --canvas: #f4f7f8;
  --teal: #007f7a;
  --teal-dark: #00635f;
  --coral: #e95d46;
  --green: #1f9d55;
  --red: #d83a34;
  --amber: #f1b735;
  --shadow: 0 18px 55px rgba(23, 33, 43, 0.14);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
  color: var(--ink);
  background: var(--canvas);
}

body {
  min-height: 100vh;
}

button,
input,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.hidden {
  display: none !important;
}

.kicker {
  margin: 0 0 8px;
  color: var(--teal);
  font-size: 18px;
  font-weight: 800;
}

.primary-action,
.secondary-action,
.danger-action,
.text-action {
  min-height: 52px;
  border: 0;
  border-radius: 8px;
  padding: 0 24px;
  font-weight: 800;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

.primary-action {
  color: #fff;
  background: var(--teal);
}

.primary-action:active {
  background: var(--teal-dark);
}

.secondary-action {
  color: var(--ink);
  background: #e8eef2;
}

.danger-action {
  color: #fff;
  background: var(--red);
}

.text-action {
  color: var(--teal);
  background: transparent;
  padding: 0 6px;
}

.primary-action.xl {
  min-height: 82px;
  width: min(420px, 100%);
  font-size: 30px;
}

.secondary-action.full {
  width: 100%;
}

.small {
  min-height: 42px;
  padding: 0 16px;
  font-size: 15px;
}

.participant-page {
  background: var(--participant-background, var(--canvas));
}

.quiz-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
}

.start-panel,
.complete-panel,
.quiz-panel {
  width: min(1040px, 100%);
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.start-panel,
.complete-panel {
  min-height: min(680px, calc(100vh - 56px));
  position: relative;
  overflow: hidden;
  display: grid;
  align-content: center;
  justify-items: center;
  padding: 48px;
  text-align: center;
}

.start-panel {
  background-color: var(--paper);
  background-image: var(--start-background-overlay, none), var(--start-background-image, none);
  background-position: center;
  background-size: cover;
}

.complete-panel {
  background-color: var(--paper);
  background-image: var(--final-background-overlay, none), var(--final-background-image, none);
  background-position: center;
  background-size: cover;
}

.hero-content-panel {
  position: relative;
  z-index: 2;
  width: min(720px, 100%);
  display: grid;
  justify-items: center;
  gap: 42px;
  padding: 44px;
  border: 1px solid rgba(216, 224, 231, 0.9);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 18px 46px rgba(23, 33, 43, 0.18);
}

.brand-block h1,
.complete-panel h2 {
  margin: 0;
  font-size: clamp(58px, 9vw, 106px);
  line-height: 1;
}

.start-meta,
.mission-subtitle {
  margin: 20px 0 0;
  color: var(--muted);
  font-size: 28px;
  font-weight: 700;
}

.quiz-panel {
  min-height: min(760px, calc(100vh - 56px));
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
}

.quiz-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 28px 34px 18px;
}

.quiz-topbar strong {
  font-size: 32px;
}

.timer-badge {
  width: 86px;
  height: 86px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: #fff;
  background: var(--teal);
  font-size: 42px;
  font-weight: 900;
}

.timer-badge.danger {
  background: var(--coral);
}

.timer-track {
  height: 12px;
  background: #dfe8ed;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  background: var(--amber);
  transform-origin: left center;
  transition: transform 220ms linear;
}

.question-area {
  position: relative;
  display: grid;
  grid-template-rows: minmax(160px, auto) 1fr;
  gap: 26px;
  padding: 36px;
}

.question-area h2 {
  margin: 0;
  display: flex;
  align-items: center;
  font-size: clamp(34px, 5.2vw, 60px);
  line-height: 1.18;
  letter-spacing: 0;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.question-area.long-question h2 {
  font-size: clamp(25px, 3.6vw, 42px);
}

.answer-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.answer-button {
  min-height: 126px;
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 24px;
  background: #f9fbfc;
  color: var(--ink);
  font-size: clamp(28px, 4.4vw, 44px);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: 0;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.answer-button.long-answer {
  font-size: clamp(21px, 3.1vw, 32px);
}

.answer-button:active,
.answer-button.selected {
  border-color: var(--teal);
  background: #e0f5f1;
}

.result-stamp {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  gap: 18px;
  align-content: center;
  background: rgba(255, 255, 255, 0.9);
  text-align: center;
  z-index: 3;
}

.result-stamp span {
  width: min(280px, 42vw);
  aspect-ratio: 1;
  border: 14px solid currentColor;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: clamp(104px, 20vw, 190px);
  font-weight: 1000;
  line-height: 1;
}

.result-stamp strong {
  font-size: clamp(34px, 6vw, 64px);
}

.result-stamp.correct {
  color: var(--green);
}

.result-stamp.wrong {
  color: var(--red);
}

.mission-title {
  position: relative;
  z-index: 1;
  max-width: 100%;
  color: var(--ink);
  text-align: center;
  font-size: clamp(48px, 9vw, 118px);
  font-weight: 1000;
  line-height: 0.95;
  letter-spacing: 0;
}

.fireworks {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.spark {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--color);
  box-shadow: 0 0 14px var(--color);
  transform: translate(-50%, -50%) scale(0.4);
  animation: firework-burst 950ms ease-out forwards;
}

@keyframes firework-burst {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4);
  }

  14% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.08);
  }
}

.admin-page {
  background: #f4f7f8;
}

.admin-shell {
  width: min(1280px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: 24px;
}

.login-panel {
  min-height: calc(100vh - 48px);
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 34px;
  text-align: center;
}

.login-panel h1,
.admin-header h1 {
  margin: 0;
  font-size: clamp(38px, 6vw, 66px);
  line-height: 1.05;
}

.login-form,
.editor-panel,
.question-list-panel {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 10px 34px rgba(23, 33, 43, 0.08);
}

.login-form {
  width: min(440px, 100%);
  display: grid;
  gap: 16px;
  padding: 28px;
  text-align: left;
}

label,
.answer-settings {
  display: grid;
  gap: 8px;
}

label span,
.label-text {
  color: var(--muted);
  font-size: 15px;
  font-weight: 800;
}

input,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 14px 16px;
  font-size: 18px;
  line-height: 1.4;
}

textarea {
  resize: vertical;
}

.form-message {
  min-height: 24px;
  margin: 0;
  color: var(--coral);
  font-weight: 750;
}

.admin-workspace {
  display: grid;
  gap: 20px;
}

.admin-header,
.section-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.admin-header {
  padding: 12px 0 8px;
}

.admin-actions,
.item-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.admin-grid {
  display: grid;
  grid-template-columns: minmax(360px, 0.85fr) minmax(480px, 1.15fr);
  gap: 20px;
  align-items: start;
}

.editor-panel,
.question-list-panel {
  padding: 22px;
}

.section-heading h2 {
  margin: 0;
  font-size: 25px;
}

.section-heading span {
  color: var(--muted);
  font-weight: 800;
}

.question-form,
.bulk-panel,
.design-form {
  display: grid;
  gap: 16px;
}

.question-editor-block,
.bulk-panel {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}

.design-settings-block {
  display: grid;
  gap: 16px;
}

.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.color-field input[type="color"] {
  height: 52px;
  padding: 6px;
}

.image-field {
  display: grid;
  gap: 8px;
}

.image-field > span,
.image-actions small {
  color: var(--muted);
  font-size: 15px;
  font-weight: 800;
}

.image-field input[type="file"] {
  min-height: 52px;
}

.image-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.range-field {
  display: grid;
  gap: 10px;
}

.range-field span {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.range-field strong {
  color: var(--teal);
}

.range-field input[type="range"] {
  width: 100%;
  accent-color: var(--teal);
}

.toggle-field {
  grid-template-columns: 24px 1fr;
  align-items: center;
}

.toggle-field input[type="checkbox"] {
  width: 22px;
  height: 22px;
  accent-color: var(--teal);
}

.segmented-control {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 4px;
  padding: 4px;
  border-radius: 8px;
  background: #e8eef2;
}

.segmented-control button {
  min-height: 48px;
  border: 0;
  border-radius: 6px;
  color: var(--muted);
  background: transparent;
  font-weight: 900;
}

.segmented-control button.active {
  color: #fff;
  background: var(--teal);
}

.segmented-control.compact {
  width: min(280px, 100%);
}

.choice-fields {
  display: grid;
  gap: 10px;
}

.choice-row {
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: center;
  gap: 12px;
}

.choice-row input[type="radio"] {
  width: 24px;
  height: 24px;
  accent-color: var(--teal);
}

.question-list {
  display: grid;
  gap: 12px;
  margin-top: 16px;
}

.question-item {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 14px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.question-meta {
  display: grid;
  align-content: start;
  gap: 8px;
}

.question-meta span {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  color: #fff;
  background: var(--ink);
  font-weight: 900;
}

.question-meta strong {
  color: var(--teal);
  font-size: 14px;
}

.question-item-body {
  display: grid;
  gap: 10px;
}

.question-item-body p {
  margin: 0;
  font-size: 18px;
  font-weight: 800;
  line-height: 1.35;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.question-item-body small {
  color: var(--muted);
  font-size: 15px;
  font-weight: 750;
}

.empty-list {
  margin: 0;
  padding: 28px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
  font-weight: 800;
}

@media (max-width: 860px) {
  .quiz-shell {
    padding: 14px;
  }

  .start-panel,
  .complete-panel,
  .quiz-panel {
    min-height: calc(100vh - 28px);
  }

  .start-panel,
  .complete-panel {
    padding: 28px;
  }

  .hero-content-panel {
    padding: 30px 22px;
  }

  .quiz-topbar {
    padding: 18px 20px 12px;
  }

  .timer-badge {
    width: 72px;
    height: 72px;
    font-size: 36px;
  }

  .question-area {
    grid-template-rows: auto 1fr;
    padding: 22px;
  }

  .answer-grid {
    grid-template-columns: 1fr;
  }

  .answer-button {
    min-height: 96px;
  }

  .admin-shell {
    padding: 14px;
  }

  .admin-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .admin-grid {
    grid-template-columns: 1fr;
  }

  .question-item {
    grid-template-columns: 54px 1fr;
  }

  .settings-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 520px) {
  .brand-block h1,
  .complete-panel h2 {
    font-size: 50px;
  }

  .start-meta,
  .mission-subtitle {
    font-size: 22px;
  }

  .primary-action.xl {
    min-height: 72px;
    font-size: 24px;
  }

  .admin-actions,
  .item-actions {
    width: 100%;
  }

  .admin-actions > *,
  .item-actions > * {
    flex: 1;
  }
}

    </style>
  </head>
  <body class="participant-page">
    <main class="quiz-shell" id="app">
      <section class="start-panel" id="startPanel">

<script>
const OFFLINE_QUESTIONS = [

  {

    "type": "choice",
    "prompt": "8.용인시에는 시각적, 감각적, 미적 느낌을 담은 사회적경제 제품 플랫폼이 있습니다. 사회적경제와 아름다운 감각의 만남~이라는 뜻입니다.\n   용인시 사회적경제 공동브랜드의 명칭으로 사용되는 4글자! 무엇일까요?",

  timer: null
};

const startPanel = document.querySelector("#startPanel");
const quizPanel = document.querySelector("#quizPanel");
const completePanel = document.querySelector("#completePanel");
const startButton = document.querySelector("#startButton");
const restartButton = document.querySelector("#restartButton");
const startKicker = document.querySelector("#startKicker");
const quizTitle = document.querySelector("#quizTitle");
const startMeta = document.querySelector("#startMeta");
const progressLabel = document.querySelector("#progressLabel");
const timerBadge = document.querySelector("#timerBadge");
const timerFill = document.querySelector("#timerFill");
const questionArea = document.querySelector(".question-area");
const questionText = document.querySelector("#questionText");
const answerGrid = document.querySelector("#answerGrid");
const resultStamp = document.querySelector("#resultStamp");
const resultSymbol = document.querySelector("#resultSymbol");
const resultText = document.querySelector("#resultText");
const fireworks = document.querySelector("#fireworks");
const finalKicker = document.querySelector("#finalKicker");
const finalMessage = document.querySelector("#finalMessage");

function formatMessage(template, values) {
  return String(template || "")
    .replace(/\{count\}/g, String(values.count))
    .replace(/\{seconds\}/g, String(values.seconds));
}

function applySettings() {
  const settings = state.settings;
  startKicker.textContent = settings.startKicker;
  quizTitle.textContent = settings.quizTitle;
  startMeta.textContent = formatMessage(settings.startMessage, {
    count: state.questions.length,
    seconds: settings.timeLimitSeconds
  });
  finalKicker.textContent = settings.finalKicker;
  finalMessage.textContent = settings.finalMessage;
  document.documentElement.style.setProperty("--participant-background", settings.backgroundColor);
  document.documentElement.style.setProperty("--start-background-image", cssImage(settings.startBackgroundImage));
  document.documentElement.style.setProperty("--start-background-overlay", dimOverlay(settings.startBackgroundImage, settings.startBackgroundDim));
  document.documentElement.style.setProperty("--final-background-image", cssImage(settings.finalBackgroundImage));
  document.documentElement.style.setProperty("--final-background-overlay", dimOverlay(settings.finalBackgroundImage, settings.finalBackgroundDim));
  document.documentElement.style.setProperty("--ink", settings.textColor);
  document.documentElement.style.setProperty("--teal", settings.buttonColor);
  document.documentElement.style.setProperty("--teal-dark", shadeColor(settings.buttonColor, -18));
  document.documentElement.style.setProperty("--green", settings.correctColor);
  document.documentElement.style.setProperty("--red", settings.wrongColor);
}

function cssImage(value) {
  return value ? `url("${value}")` : "none";
}

function dimOverlay(image, amount) {
  if (!image) return "none";
  const opacity = Math.max(0, Math.min(80, Number(amount) || 0)) / 100;
  return `linear-gradient(rgba(0,0,0,${opacity}), rgba(0,0,0,${opacity}))`;
}

function shadeColor(hex, percent) {
  const value = hex.replace("#", "");
  const amount = Math.round((percent / 100) * 255);
  const channels = [0, 2, 4].map((offset) => {
    const channel = parseInt(value.slice(offset, offset + 2), 16);
    return Math.max(0, Math.min(255, channel + amount)).toString(16).padStart(2, "0");
  });
  return `#${channels.join("")}`;
}

function showOnly(panel) {
  [startPanel, quizPanel, completePanel].forEach((item) => item.classList.add("hidden"));
  panel.classList.remove("hidden");
}

function startQuiz() {
  state.currentIndex = 0;
  clearFireworks();
  showOnly(quizPanel);
  renderQuestion();
}

function renderQuestion() {
  clearInterval(state.timer);
  state.answered = false;
  state.secondsLeft = state.settings.timeLimitSeconds;
  resultStamp.classList.add("hidden");

  const question = state.questions[state.currentIndex];
  questionArea.classList.toggle("long-question", question.prompt.length > 90);
  progressLabel.textContent = `${state.currentIndex + 1} / ${state.questions.length}`;
  questionText.textContent = question.prompt;
  answerGrid.innerHTML = "";

  question.choices.forEach((choice, index) => {
    const button = document.createElement("button");
    button.className = "answer-button";
    button.classList.toggle("long-answer", String(choice).length > 20);
    button.type = "button";
    button.textContent = choice;
    button.addEventListener("click", () => submitAnswer(index, button));
    answerGrid.appendChild(button);
  });

  updateTimer();
  state.timer = setInterval(() => {
    state.secondsLeft -= 1;
    updateTimer();
    if (state.secondsLeft <= 0) {
      markAnswered(false);
    }
  }, 1000);
}

function updateTimer() {
  timerBadge.textContent = String(state.secondsLeft);
  timerFill.style.transform = `scaleX(${state.secondsLeft / state.settings.timeLimitSeconds})`;
  timerBadge.classList.toggle("danger", state.secondsLeft <= 5);
}

function submitAnswer(answer, selectedButton) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);
  disableAnswers();
  selectedButton.classList.add("selected");

  const question = state.questions[state.currentIndex];
  const submittedAnswer = question.type === "ox" ? answer === 0 : answer;
  markAnswered(submittedAnswer === question.answer);
}

function disableAnswers() {
  answerGrid.querySelectorAll("button").forEach((button) => {
    button.disabled = true;
  });
}

function markAnswered(correct) {
  if (!state.answered) {
    state.answered = true;
    clearInterval(state.timer);
    disableAnswers();
  }

  resultStamp.classList.toggle("correct", correct);
  resultStamp.classList.toggle("wrong", !correct);
  resultSymbol.textContent = correct ? "O" : "X";
  resultText.textContent = correct ? "정답입니다" : "다시 도전!";
  resultStamp.classList.remove("hidden");

  setTimeout(() => {
    if (correct) {
      nextQuestion();
      return;
    }
    renderQuestion();
  }, RESULT_DELAY_MS);
}

function nextQuestion() {
  state.currentIndex += 1;
  if (state.currentIndex >= state.questions.length) {
    showComplete();
    return;
  }
  renderQuestion();
}

function showComplete() {
  clearInterval(state.timer);
  showOnly(completePanel);
  if (state.settings.fireworksEnabled) launchFireworks();
}

function clearFireworks() {
  fireworks.innerHTML = "";
}

function launchFireworks() {
  clearFireworks();
  const colors = ["#f1b735", "#e95d46", "#1f9d55", "#007f7a", "#3f7be8", "#d8479f"];
  for (let burst = 0; burst < 9; burst += 1) {
    setTimeout(() => {
      createBurst(18 + Math.random() * 64, 14 + Math.random() * 46, colors);
    }, burst * 220);
  }
}

function createBurst(left, top, colors) {
  const count = 24;
  for (let index = 0; index < count; index += 1) {
    const spark = document.createElement("span");
    const angle = (Math.PI * 2 * index) / count;
    const distance = 90 + Math.random() * 130;
    spark.className = "spark";
    spark.style.left = `${left}%`;
    spark.style.top = `${top}%`;
    spark.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
    spark.style.setProperty("--y", `${Math.sin(angle) * distance}px`);
    spark.style.setProperty("--color", colors[index % colors.length]);
    spark.addEventListener("animationend", () => spark.remove());
    fireworks.appendChild(spark);
  }
}

applySettings();
startButton.addEventListener("click", startQuiz);
restartButton.addEventListener("click", () => {
  clearFireworks();
  showOnly(startPanel);
});
    </script>
  </body>
</html>
